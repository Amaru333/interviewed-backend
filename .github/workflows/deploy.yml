name: Deploy to AWS EC2

on:
  release:
    types: [published]  # Deploys when you publish a new release
  workflow_dispatch:  # Allows manual deployment from GitHub UI

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🧪 Test SSH Connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH connection successful!'"

      - name: 📤 Deploy to EC2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << 'ENDSSH'
            set -e
            
            # Debug: Show current directory and list contents
            echo "📍 Current directory: $(pwd)"
            echo "📂 Directory contents:"
            ls -la
            
            # Navigate to backend directory (try multiple possible locations)
            if [ -d "interviewed-backend" ]; then
              cd interviewed-backend
            elif [ -d "backend" ]; then
              cd backend
            elif [ -d "$HOME/interviewed-backend" ]; then
              cd $HOME/interviewed-backend
            elif [ -d "$HOME/backend" ]; then
              cd $HOME/backend
            else
              echo "❌ Error: Cannot find backend directory!"
              echo "Available directories:"
              ls -la ~
              exit 1
            fi
            
            echo "✅ Found backend at: $(pwd)"
            
            # Stash any local changes to avoid conflicts
            git stash
            
            # Pull latest changes
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # Show latest commit
            echo "📝 Latest commit:"
            git log --oneline -1
            
            # Activate virtual environment
            source venv/bin/activate
            
            # Install/update dependencies
            echo "📦 Installing dependencies..."
            pip install -r requirements.txt
            
            # Set up environment variables
            echo "🔐 Setting up environment variables..."
            cat > .env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ENVEOF
            
            # Force restart the application (delete and recreate for clean restart)
            echo "🔄 Restarting application..."
            pm2 delete interviewed-backend || true
            pm2 start start.sh --name interviewed-backend
            
            # Save PM2 configuration
            pm2 save
            
            # Show status
            echo "✅ Deployment complete!"
            pm2 status
            
            # Show recent logs
            echo "📊 Recent logs:"
            pm2 logs interviewed-backend --lines 10 --nostream
          ENDSSH

      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Deployment successful!"
          echo "🔗 Your app is live at: http://${{ secrets.EC2_HOST }}:8000"

      - name: 📊 Health Check
        run: |
          sleep 5  # Wait for app to start
          curl -f http://${{ secrets.EC2_HOST }}:8000/api/health || echo "⚠️ Health check failed"
