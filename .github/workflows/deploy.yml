name: Deploy to AWS EC2

on:
  release:
    types: [published]  # Deploys when you publish a new release
  workflow_dispatch:  # Allows manual deployment from GitHub UI

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔑 Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🧪 Test SSH Connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH connection successful!'"

      - name: 📤 Deploy to EC2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << 'ENDSSH'
            set -e
            
            # Navigate to backend directory
            cd interviewed-backend
            
            # Pull latest changes
            git stash
            git pull origin main
            
            # Activate virtual environment and install dependencies
            source venv/bin/activate
            pip install -q -r requirements.txt
            
            # Set up environment variables
            cat > .env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ENVEOF
            
            # Restart application
            pm2 delete interviewed-backend 2>/dev/null || true
            pm2 start start.sh --name interviewed-backend
            pm2 save
          ENDSSH

      - name: ✅ Deployment Complete
        run: |
          echo "🎉 Deployment successful!"
          echo "🔗 Your app is live at: http://${{ secrets.EC2_HOST }}:8000"

      - name: 📊 Health Check
        run: |
          sleep 5  # Wait for app to start
          curl -f http://${{ secrets.EC2_HOST }}:8000/api/health || echo "⚠️ Health check failed"
